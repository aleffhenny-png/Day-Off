<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Off - Sistema de Escala</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-corporativa">
        <div class="logo-area">
            <span class="logo-texto">SISTEMAS INTERNOS</span>
        </div>
        <div class="user-area">Produção</div>
    </header>
    <div class="linha-vermelha"></div>

    <main class="main-container">
        <div class="titulo-pagina">
            <h1>Gestão de Day Off</h1>
            <p>Escala de folgas diárias da equipe de produção.</p>
        </div>
        
        <div class="card-formulario">
            <h2>📋 SUPERVISORES DE TURNO</h2>
            <div class="supervisores-nomes" style="padding: 5px 0; font-size: 15px; color: #333;">
                <p>• <strong>HELLEN ALEXANDRE</strong></p>
                <p style="margin-top: 5px;">• <strong>MARILES MORAES</strong></p>
            </div>
        </div>

        <div class="card-formulario" style="margin-top: -15px;">
            <h2 style="font-size: 15px; color: #666;">Agendar Novo Day Off</h2>
            <div class="input-group-vertical" style="margin-top: 10px;">
                <select id="nomeFuncionario">
                    <option value="">Carregando lista...</option>
                </select>
                <input type="date" id="dataFolga">
                <button id="addBtn">AGENDAR FOLGA</button>
            </div>
        </div>

        <div id="listaItens">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
